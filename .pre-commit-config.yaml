# Pre-commit hooks for srg-core (Rust).
#
#   Install once:   pre-commit install
#   Run manually:   pre-commit run --all-files
#
# The knots hook gates code complexity (shared across our Rust tools); cargo fmt +
# clippy are the format/lint gate. `invoke check` runs all of this.

repos:
  # Standard hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]

  # Format + lint with the Rust toolchain (config in rustfmt defaults / Cargo).
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # Code-complexity gate with knots — keep functions small. require_serial keeps
  # every matched file in one invocation, so a chunk of function-free files (e.g.
  # a module of only `mod` decls / enums) can't trip knots' "No functions found".
  - repo: https://github.com/brandon-arrendondo/knots-pre-commit
    rev: v1.15.1
    hooks:
      - id: knots
        require_serial: true
