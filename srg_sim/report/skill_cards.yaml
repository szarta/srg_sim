# Curated priority for skill-requirement "tech" cards (report §key cards).
#
# Deckbuilding allows only TWO skill-requirement cards per deck, so the report
# ranks the highest-impact ones a competitor can run. Ordering: `auto` (auto-include
# if runnable) before `equal8` (the Equal-8 skill stops, critical in equal-stat
# matchups); within a tier, cards that are actually LIVE for the competitor's stat
# line / this matchup come first.
#
# Each entry:
#   name      exact card name in the DB
#   tier      auto | equal8
#   requires  {Skill: threshold} the deck must meet to run it (>=)
#   online    optional [LEFT, op, RIGHT] that must hold for the card's STOP to be
#             online. op = gt|ge. A token is a self skill ("Agility") or the
#             opponent's ("opp:Agility"). Omitted = situational (board-dependent).

priority:
  # --- Tier 1: auto-include if runnable -------------------------------------
  - name: "Poison Stars (Agility, Strike)"
    tier: auto
    requires: {Agility: 10, Strike: 9}          # also blanks opponent's Gimmick
  - name: "Colossal Smash (Power, Grapple)"
    tier: auto
    requires: {Power: 10, Grapple: 9}
    online: [Power, ge, "opp:Power"]            # stop any Submission
  - name: "Al13N Invasion (Submission)"
    tier: auto
    requires: {Submission: 8}
    online: [Agility, gt, "opp:Agility"]        # stop any Grapple + recur
  - name: "The Seven Seals (Strike)"
    tier: auto
    requires: {Strike: 8}
    online: [Power, gt, "opp:Power"]            # stop any Submission + recur
  - name: "Beg for Mercy (Grapple)"
    tier: auto
    requires: {Grapple: 8}
    online: [Technique, gt, "opp:Technique"]    # stop any Strike + recur

  # --- Tier 2: Equal-8 stops (critical in equal-stat matchups) --------------
  - name: "Springboard Lion Splash (Strike)"
    tier: equal8
    requires: {Strike: 8}
    online: [Agility, gt, Strike]               # stop any Grapple
  - name: "Ultimate Corner Crush (Agility)"
    tier: equal8
    requires: {Agility: 8}
    online: [Strike, gt, Agility]               # stop any Grapple
  - name: "Faceplant Piledriver (Power)"
    tier: equal8
    requires: {Power: 8}
    online: [Grapple, gt, Power]                # stop any Submission
  - name: "Pull Down the Ropes (Grapple)"
    tier: equal8
    requires: {Grapple: 8}
    online: [Power, gt, Grapple]                # stop any Submission
  - name: "Capture Sleeper Hold (Technique)"
    tier: equal8
    requires: {Technique: 8}
    online: [Submission, gt, Technique]         # stop any Strike
  - name: "Llama Lock (Submission)"
    tier: equal8
    requires: {Submission: 8}
    online: [Technique, gt, Submission]         # stop any Strike

# Personal-choice disruption Leads: no skill requirement (don't count against the
# 2-card limit), run by preference. Shown as a standing note, not ranked.
personal_choice:
  - "Apocalypse"
  - "Rejected!"

# At-a-glance premium skill stops (the "13/14/15" stops, by set number): Al13N #13,
# The Seven Seals #14, Beg for Mercy #15 — three Followup skill-req stops, one per RPS
# direction, each recurring a card. The scouting one-pager shows which a competitor can
# run and whether its stop is online. Colossal Smash / Poison Stars are Power-10 /
# Strike-10 specific and deliberately NOT listed here.
glance_skill_stops:
  - name: "Al13N Invasion (Submission)"
    requires: {Submission: 8}
    online: [Agility, gt, "opp:Agility"]        # stop any Grapple + recur
  - name: "The Seven Seals (Strike)"
    requires: {Strike: 8}
    online: [Power, gt, "opp:Power"]            # stop any Submission + recur
  - name: "Beg for Mercy (Grapple)"
    requires: {Grapple: 8}
    online: [Technique, gt, "opp:Technique"]    # stop any Strike + recur
