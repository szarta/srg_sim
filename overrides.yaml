# ---------------------------------------------------------------------------
# Top-96 (task #101): switch-rolled-skill family. "When you roll <S> for your
# turn roll OR Finish roll, you may switch it to Power." New action
# SwitchRolledSkill{from_skill, to} (schema v14), read structurally in BOTH roll
# paths (the turn roll-off + the Finish roll) — a no-op in apply_action. Fires
# when the rolled skill == from_skill; "you may" = optional. Trigger is Static
# (find_switch scans standing effects regardless of trigger and gates on the
# action's from_skill). UNLIMITED (no once-per-turn cap in the text). Policy
# caveat: the optional switch is decided generically by the controller policy
# (may switch even when Power is no better) — strategic tuning is a follow-up.
# ---------------------------------------------------------------------------

