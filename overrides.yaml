    '@type': Static
  condition:
    '@type': GimmickFlipped
    who: SELF
  actions:
  - '@type': BuffSkill
    skill: Grapple
    delta: 0
    who: SELF
    duration: WHILE_IN_PLAY
    target_highest: false
    per_crowd: true
    cap: 5
  duration: INSTANT
  frequency:
    '@type': FrequencyGuard
