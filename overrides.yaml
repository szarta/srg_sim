# Hand-authored Effect IR for cards the grammar cannot parse (DESIGN.md §4).
#
# Keyed by db_uuid; each value is a list of Effect dicts in the same tag-based
# form as `effects.Effect.to_dict()` (the "@type" key names each node). When a
# card's db_uuid appears here, the parser uses these effects verbatim and skips
# the grammar. Top-96 gimmicks land here first; the coverage report tracks the
# shrinking `unsupported` tail toward zero (M3).
#
# --- D2 (V1) deck (decks/d2.yaml), for the human-vs-D2 playtest (todo #42/#43) ---
# Faithful-enough IR for cards the grammar leaves Unsupported. Where a card reads
# "A or B", we model the executable, generally-best mode and note the simplification
# in each raw_clause. Selector-actions (Search / ShuffleIntoDeck / AddFromDiscard)
# move ONE matching card; "shuffle 2 / up to 3" is authored as repeated actions, so
# no Effect-IR node changed (DESIGN.md §3 review gate).


# D2 gimmick: draw 2 on a roll exactly 2 less
bd04b23708fe49728541a20e689cae61:
- '@type': Effect
  trigger:
    '@type': OnRoll
    skill: null
    who: SELF
  condition:
    '@type': RollGapExactly
    k: 2
  actions:
  - '@type': Draw
    n: 2
    source: TOP
    who: SELF
  duration: INSTANT
  frequency:
    '@type': FrequencyGuard
    kind: UNLIMITED
    n: null
  raw_clause: draw 2 when your turn roll is exactly 2 less (draw mode; hammer-recur alt simplified)
  source: gimmick

