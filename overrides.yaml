# --- Mastermind deck (decks/mastermind.yaml), side A for the playtest (todo #42) ---
# The bump gimmick uses the OnBump trigger (DESIGN.md §3). Conditional buffs use an
# Or of two HasInPlay filters (Follow Up / Finish). Remaining gaps stay Unsupported:
# #10 roll +1 per opponent Lead (dynamic count), #11 'cannot be stopped by Follow Ups'
# (no unstoppable IR), #24 search-to-discard (Search dest is HAND only), the entrance,
# and the #28/#29/#30 finish riders (add-from-discard / copy-spotlight / bump-double).

# Mastermind gimmick: bump -> opp next roll -2
31b5d4f1aa0743b4bc3d0622d81b0d92:
- '@type': Effect
  trigger:
    '@type': OnBump
  condition:
    '@type': Always
  actions:
  - '@type': ModifyRoll
    who: OPP
    delta: -2
    when: NEXT
  duration: INSTANT
  frequency:
    '@type': FrequencyGuard
    kind: ONCE_PER_TURN
    n: null
  raw_clause: when you bump, your opponent's next turn roll is -2
  source: gimmick

