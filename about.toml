# cargo-about configuration — https://embarkstudios.github.io/cargo-about/
#
# SPDX license expressions acceptable for dependencies. A new dep with a license
# not on this list fails the license check (`cargo about generate about.hbs`).

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
]
